<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>manamap — Audit Mockups</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #14110e;
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    overflow-x: auto; overflow-y: hidden;
  }
  button { font-family: inherit; -webkit-tap-highlight-color: transparent; cursor: pointer; }

  /* derived brand tokens — recompute from --brand */
  [data-theme] {
    --brand: #3E8FE6;
    --on-brand: #fff;
    --brand-soft: color-mix(in srgb, var(--brand) 16%, var(--surface));
    --brand-ink:  color-mix(in srgb, var(--brand) 62%, var(--ink));
    --r-lg: 22px; --r-md: 15px; --r-btn: 15px;
  }
  /* Dusk theme (matches manamap.html) */
  [data-theme="dusk"] {
    --bg:#191420; --surface:#241E2E; --ink:#F3ECF6; --ink-2:#C4B9CF; --muted:#8E839B;
    --line:#332B40; --line-strong:#463C56; --chip-bg:#322A3E; --chip-fg:#C4B9CF;
    --header-bg:rgba(25,20,32,0.7); --tabbar-bg:rgba(25,20,32,0.82);
    --tab-idle:#6E6480; --switch-off:#463C56; --lock-veil:rgba(36,30,46,0.5);
    --brand-ink: color-mix(in srgb, var(--brand) 52%, var(--ink));
    --shadow-card:0 4px 10px rgba(0,0,0,0.3), 0 16px 40px rgba(0,0,0,0.4);
    --shadow-row:0 2px 8px rgba(0,0,0,0.25);
  }
  #root { width: max-content; }

  .pagehead {
    position: sticky; left: 0; padding: 30px 44px 4px; width: 100vw;
  }
  .pagehead .ey { display:inline-flex; align-items:center; gap:8px; font-size:11.5px; font-weight:800;
    letter-spacing:0.12em; text-transform:uppercase; color:#9A8C5A; }
  .pagehead h1 { color:#F3EDE2; font-size:30px; font-weight:800; letter-spacing:-0.03em; margin:10px 0 4px; }
  .pagehead p { color:#94897a; font-size:14px; max-width:560px; margin:0; line-height:1.5; }
  .dot { width:11px; height:11px; border-radius:50%; background:conic-gradient(from 210deg,#E8C14B,#3E7C45,#2F6BF0,#6B4FC4,#B5453E,#E8C14B); }
  ::-webkit-scrollbar { height: 12px; width: 12px; }
  ::-webkit-scrollbar-thumb { background: #2e2820; border-radius: 99px; border: 3px solid #14110e; }
</style>
</head>
<body>
  <div class="pagehead">
    <span class="ey"><span class="dot"></span> manamap · audit mockups</span>
    <h1>Five proposed screens</h1>
    <p>Built in the app’s real visual language — dusk theme, icon set, mana identity. Each maps to a build prompt (G-codes). Scroll sideways to compare.</p>
  </div>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="app/icons.jsx"></script>
  <script type="text/babel" src="app/mockups.jsx"></script>
</body>
</html>
