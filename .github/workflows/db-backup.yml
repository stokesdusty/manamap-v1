name: DB Backup

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  backup:
    name: Backup Supabase Postgres to R2
    runs-on: ubuntu-latest
    env:
      BACKUP_DATABASE_URL: ${{ secrets.BACKUP_DATABASE_URL }}
      BACKUP_R2_ACCOUNT_ID: ${{ secrets.BACKUP_R2_ACCOUNT_ID }}
      BACKUP_R2_BUCKET: ${{ secrets.BACKUP_R2_BUCKET }}
      BACKUP_RETENTION_DAYS: ${{ secrets.BACKUP_RETENTION_DAYS }}
      AWS_ACCESS_KEY_ID: ${{ secrets.BACKUP_R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.BACKUP_R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
    steps:
      - uses: actions/checkout@v4

      - name: Install postgresql-client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Run backup
        run: bash scripts/backup-db.sh
