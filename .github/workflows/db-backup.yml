name: DB Backup

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  backup:
    name: Backup Supabase Postgres to R2
    runs-on: ubuntu-latest
    env:
      BACKUP_DATABASE_URL: ${{ secrets.BACKUP_DATABASE_URL }}
      BACKUP_R2_ACCOUNT_ID: ${{ secrets.BACKUP_R2_ACCOUNT_ID }}
      BACKUP_R2_BUCKET: ${{ secrets.BACKUP_R2_BUCKET }}
      BACKUP_RETENTION_DAYS: ${{ secrets.BACKUP_RETENTION_DAYS }}
      AWS_ACCESS_KEY_ID: ${{ secrets.BACKUP_R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.BACKUP_R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
    steps:
      - uses: actions/checkout@v4

      # Supabase runs Postgres 17 — pg_dump refuses to dump from a server newer
      # than itself, and Ubuntu's default apt repo only ships client 16.x.
      # Bump this to postgresql-client-18 etc. if Supabase upgrades again.
      - name: Install postgresql-client 17
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get install -y postgresql-client-17

      - name: Run backup
        run: bash scripts/backup-db.sh
