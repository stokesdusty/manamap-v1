name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    name: API E2E
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: manamap
          POSTGRES_PASSWORD: manamap
          POSTGRES_DB: manamap_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U manamap"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql://manamap:manamap@localhost:5432/manamap_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-jwt-secret-minimum-32-characters-ok
      NODE_ENV: test
      THROTTLE_DISABLED: "true"
      DEV_TOOLS: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @manamap/api exec prisma generate

      - name: Run E2E tests
        run: pnpm --filter @manamap/api test:e2e
